<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curso de Robótica | Prof. Marco Cuadros</title>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Exo+2:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        /* ─────────────────────────────────────
           LINK DE COMPRA — ACTUALIZA AQUI
           ─────────────────────────────────── */
        /* var(--buy-url) no funciona en href,
           usa el id="buy-link" en JS abajo   */

        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

        :root{
            --bg:#04050d;
            --bg2:#080b18;
            --bg3:#0d1023;
            --panel:#111627;
            --cyan:#00f0ff;
            --cyan2:rgba(0,240,255,0.15);
            --gold:#f5c53a;
            --green:#00e676;
            --red:#ff1744;
            --text:#e8eaf6;
            --muted:#7986cb;
            --border:rgba(0,240,255,0.18);
        }

        html{scroll-behavior:smooth}
        body{
            font-family:"Exo 2",sans-serif;
            background:var(--bg);
            color:var(--text);
            line-height:1.65;
            overflow-x:hidden;
        }

        /* ── CANVAS ANIMADO ── */
        #circuit-bg{
            position:fixed;top:0;left:0;
            width:100%;height:100%;
            z-index:0;pointer-events:none;
            opacity:0.18;
        }

        /* ── TOPBAR ── */
        .topbar{
            position:relative;z-index:10;
            background:var(--red);
            text-align:center;
            padding:.55rem 1rem;
            font-family:"Orbitron",sans-serif;
            font-size:.78rem;
            font-weight:700;
            letter-spacing:.08em;
            animation:pulse-bar 2s ease-in-out infinite;
        }
        @keyframes pulse-bar{0%,100%{opacity:1}50%{opacity:.82}}

        /* ── CONTAINERS ── */
        .wrap{max-width:960px;margin:0 auto;padding:0 1.25rem;position:relative;z-index:2}

        /* ── BOTÕES ── */
        .btn{
            display:inline-block;
            text-decoration:none;
            font-family:"Orbitron",sans-serif;
            font-weight:700;
            letter-spacing:.06em;
            text-transform:uppercase;
            border-radius:4px;
            cursor:pointer;
            transition:transform .15s,box-shadow .15s,filter .15s;
            border:none;
        }
        .btn:hover{transform:translateY(-2px);filter:brightness(1.12)}
        .btn-green{
            background:var(--green);color:#000;
            font-size:1rem;padding:.95rem 2.2rem;
            box-shadow:0 0 28px rgba(0,230,118,.4);
        }
        .btn-green:hover{box-shadow:0 0 40px rgba(0,230,118,.6)}
        .btn-cyan{
            background:transparent;color:var(--cyan);
            font-size:.88rem;padding:.75rem 1.8rem;
            border:1px solid var(--cyan);
            box-shadow:0 0 14px rgba(0,240,255,.2);
        }
        .btn-cyan:hover{background:var(--cyan2)}

        /* ── HERO ── */
        .hero{
            position:relative;z-index:2;
            min-height:100svh;
            display:flex;align-items:center;
            padding:3rem 0 2rem;
            overflow:hidden;
        }
        .hero::before{
            content:"";position:absolute;
            top:-30%;left:50%;transform:translateX(-50%);
            width:120%;height:120%;
            background:radial-gradient(ellipse at 50% 30%, rgba(0,240,255,.08) 0%, transparent 65%);
            pointer-events:none;z-index:0;
        }
        .hero-grid{
            display:grid;
            grid-template-columns:1fr 420px;
            gap:2.5rem;
            align-items:center;
            position:relative;z-index:1;
        }
        .hero-badge{
            display:inline-flex;align-items:center;gap:.5rem;
            background:rgba(0,240,255,.08);
            border:1px solid var(--border);
            border-radius:3px;
            padding:.3rem .9rem;
            font-size:.72rem;font-weight:700;
            letter-spacing:.12em;text-transform:uppercase;
            color:var(--cyan);margin-bottom:1rem;
        }
        .hero-badge::before{
            content:"";width:6px;height:6px;border-radius:50%;
            background:var(--cyan);
            animation:blink 1.2s ease-in-out infinite;
        }
        @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
        .hero h1{
            font-family:"Orbitron",sans-serif;
            font-size:clamp(1.7rem,4vw,2.8rem);
            font-weight:900;
            line-height:1.15;
            margin-bottom:1rem;
            text-transform:uppercase;
        }
        .hero h1 span{color:var(--cyan);text-shadow:0 0 20px rgba(0,240,255,.4)}
        .hero-sub{
            color:var(--muted);
            font-size:1rem;
            margin-bottom:1.8rem;
            max-width:440px;
        }
        .price-strip{
            display:flex;align-items:center;gap:1.2rem;
            background:var(--panel);
            border:1px solid var(--border);
            border-radius:6px;
            padding:1rem 1.3rem;
            margin-bottom:1.5rem;
            flex-wrap:wrap;
        }
        .price-label{font-size:.78rem;color:var(--muted);line-height:1.3}
        .price-val{
            font-family:"Orbitron",sans-serif;
            font-size:2.2rem;font-weight:900;
            color:var(--gold);
            line-height:1;
        }
        .price-val sup{font-size:1rem;vertical-align:top;margin-top:.3rem}
        .price-tag{
            background:rgba(245,197,58,.1);
            border:1px solid rgba(245,197,58,.25);
            border-radius:3px;
            padding:.25rem .7rem;
            font-size:.75rem;color:var(--gold);
            font-weight:700;white-space:nowrap;
        }
        .warning-txt{font-size:.75rem;color:var(--muted);margin-top:.8rem}

        /* ── FOTO HERO ── */
        .hero-photo-wrap{
            position:relative;
        }
        .hero-photo-wrap::before{
            content:"";position:absolute;
            inset:-3px;border-radius:12px;
            background:linear-gradient(135deg,var(--cyan),transparent 55%,var(--gold) 100%);
            z-index:0;animation:border-rotate 4s linear infinite;
        }
        @keyframes border-rotate{
            0%{background:linear-gradient(0deg,var(--cyan),transparent 55%,var(--gold))}
            25%{background:linear-gradient(90deg,var(--cyan),transparent 55%,var(--gold))}
            50%{background:linear-gradient(180deg,var(--cyan),transparent 55%,var(--gold))}
            75%{background:linear-gradient(270deg,var(--cyan),transparent 55%,var(--gold))}
            100%{background:linear-gradient(360deg,var(--cyan),transparent 55%,var(--gold))}
        }
        .hero-photo-inner{
            position:relative;z-index:1;
            border-radius:10px;overflow:hidden;
        }
        .hero-photo-inner img{
            width:100%;display:block;
            filter:saturate(1.05) contrast(1.03);
        }
        .hero-photo-label{
            position:absolute;bottom:0;left:0;right:0;
            background:linear-gradient(to top,rgba(4,5,13,.95),transparent);
            padding:1.5rem 1rem .8rem;
            text-align:center;z-index:2;
        }
        .hero-photo-label .name{
            font-family:"Orbitron",sans-serif;
            font-size:.95rem;font-weight:700;
            color:var(--cyan);letter-spacing:.06em;
        }
        .hero-photo-label .title{
            font-size:.75rem;color:var(--muted);
        }

        /* ── SECTION BASE ── */
        section{padding:4.5rem 0;position:relative;z-index:2}
        .sec-eyebrow{
            font-size:.7rem;font-weight:700;
            letter-spacing:.14em;text-transform:uppercase;
            color:var(--cyan);margin-bottom:.5rem;
        }
        .sec-title{
            font-family:"Orbitron",sans-serif;
            font-size:clamp(1.4rem,3vw,2rem);
            font-weight:900;text-transform:uppercase;
            margin-bottom:.7rem;line-height:1.2;
        }
        .sec-title span{color:var(--cyan)}
        .sec-sub{
            color:var(--muted);font-size:.95rem;
            max-width:560px;margin:0 auto 2.8rem;
        }
        .tc{text-align:center}

        /* ── MÓDULOS ── */
        .sec-modulos{background:var(--bg2)}
        .modulos-grid{
            display:grid;
            grid-template-columns:repeat(3,1fr);
            gap:1.2rem;
        }
        .mod-card{
            background:var(--panel);
            border:1px solid var(--border);
            border-radius:8px;padding:1.4rem;
            transition:border-color .2s,transform .2s,box-shadow .2s;
            position:relative;overflow:hidden;
        }
        .mod-card::before{
            content:"";position:absolute;
            top:0;left:0;right:0;height:2px;
            background:linear-gradient(90deg,transparent,var(--cyan),transparent);
            transform:scaleX(0);transition:transform .3s;
        }
        .mod-card:hover{
            border-color:var(--cyan);
            transform:translateY(-3px);
            box-shadow:0 8px 24px rgba(0,240,255,.1);
        }
        .mod-card:hover::before{transform:scaleX(1)}
        .mod-icon{
            width:42px;height:42px;
            background:var(--cyan2);
            border:1px solid var(--border);
            border-radius:8px;
            display:flex;align-items:center;justify-content:center;
            font-size:1.2rem;margin-bottom:.9rem;
        }
        .mod-card h3{
            font-family:"Orbitron",sans-serif;
            font-size:.82rem;font-weight:700;
            text-transform:uppercase;letter-spacing:.04em;
            margin-bottom:.45rem;color:var(--text);
        }
        .mod-card p{font-size:.83rem;color:var(--muted);line-height:1.55}

        /* ── PROFESSOR ── */
        .sec-prof{background:var(--bg)}
        .prof-inner{
            display:grid;
            grid-template-columns:340px 1fr;
            gap:3.5rem;align-items:center;
        }
        .prof-img{
            border-radius:10px;overflow:hidden;
            border:1px solid var(--border);
            position:relative;
        }
        .prof-img img{width:100%;display:block}
        .prof-img::after{
            content:"";position:absolute;
            bottom:0;left:0;right:0;height:35%;
            background:linear-gradient(to top,var(--bg),transparent);
        }
        .prof-text .sec-title{text-align:left;margin-bottom:.4rem}
        .prof-text p{
            color:var(--muted);font-size:.9rem;
            margin-bottom:.85rem;line-height:1.7;
        }
        .tags{display:flex;flex-wrap:wrap;gap:.5rem;margin:1.2rem 0 1.8rem}
        .tag{
            background:var(--cyan2);
            border:1px solid var(--border);
            border-radius:20px;
            padding:.28rem .85rem;
            font-size:.75rem;color:var(--cyan);font-weight:500;
        }

        /* ── PARA QUIÉN ── */
        .sec-para{background:var(--bg2)}
        .para-grid{
            display:grid;
            grid-template-columns:repeat(3,1fr);
            gap:1.1rem;
        }
        .para-card{
            background:var(--panel);
            border:1px solid var(--border);
            border-radius:8px;
            padding:1.4rem;text-align:center;
            transition:border-color .2s,box-shadow .2s;
        }
        .para-card:hover{
            border-color:var(--cyan);
            box-shadow:0 4px 16px rgba(0,240,255,.1);
        }
        .para-icon{font-size:1.9rem;margin-bottom:.7rem;display:block}
        .para-card h3{
            font-family:"Orbitron",sans-serif;
            font-size:.78rem;font-weight:700;
            text-transform:uppercase;margin-bottom:.35rem;
        }
        .para-card p{font-size:.8rem;color:var(--muted)}

        /* ── TRANSFORMACIÓN ── */
        .sec-trans{background:var(--bg3)}
        .trans-grid{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:1.1rem;
        }
        .trans-card{
            background:var(--panel);
            border:1px solid var(--border);
            border-radius:8px;
            padding:1.4rem;
            display:flex;gap:.9rem;align-items:flex-start;
            transition:border-color .2s;
        }
        .trans-card:hover{border-color:var(--cyan)}
        .trans-icon{
            width:42px;height:42px;flex-shrink:0;
            background:var(--cyan2);
            border-radius:8px;
            display:flex;align-items:center;justify-content:center;
            font-size:1.2rem;
        }
        .trans-card h3{
            font-family:"Orbitron",sans-serif;
            font-size:.78rem;font-weight:700;
            text-transform:uppercase;margin-bottom:.3rem;
        }
        .trans-card p{font-size:.82rem;color:var(--muted)}

        /* ── BONUS ── */
        .sec-bonus{background:var(--bg2)}
        .bonus-card{
            background:var(--panel);
            border:1px solid var(--border);
            border-radius:10px;
            padding:1.8rem 2rem;
            display:flex;gap:1.8rem;align-items:center;
            margin-bottom:1.2rem;
            transition:border-color .2s;
            position:relative;overflow:hidden;
        }
        .bonus-card::after{
            content:"";position:absolute;
            top:0;bottom:0;left:0;width:3px;
            background:var(--gold);
        }
        .bonus-card:hover{border-color:var(--gold)}
        .bonus-num{
            font-family:"Orbitron",sans-serif;
            font-size:3.5rem;font-weight:900;
            color:rgba(245,197,58,.18);
            line-height:1;flex-shrink:0;min-width:52px;
        }
        .bonus-content h3{
            font-family:"Orbitron",sans-serif;
            font-size:1rem;text-transform:uppercase;
            margin-bottom:.5rem;color:var(--gold);
        }
        .bonus-content p{color:var(--muted);font-size:.88rem}

        /* ── GARANTÍA ── */
        .sec-garantia{background:var(--bg)}
        .garantia-box{
            background:var(--panel);
            border:1px solid var(--border);
            border-radius:12px;
            padding:2.8rem;
            display:flex;gap:2.5rem;align-items:center;
        }
        .garantia-badge{
            width:130px;height:130px;flex-shrink:0;
            background:radial-gradient(circle,#a07510,#6b4e0d);
            border-radius:50%;
            border:3px solid var(--gold);
            display:flex;flex-direction:column;
            align-items:center;justify-content:center;
            text-align:center;
            box-shadow:0 0 32px rgba(245,197,58,.3);
            animation:glow-gold 3s ease-in-out infinite;
        }
        @keyframes glow-gold{
            0%,100%{box-shadow:0 0 32px rgba(245,197,58,.3)}
            50%{box-shadow:0 0 52px rgba(245,197,58,.55)}
        }
        .garantia-badge .days{
            font-family:"Orbitron",sans-serif;
            font-size:2.7rem;font-weight:900;
            color:#fff;line-height:1;
        }
        .garantia-badge .label{
            font-size:.62rem;font-weight:700;
            letter-spacing:.1em;text-transform:uppercase;
            color:rgba(255,255,255,.8);
        }
        .garantia-text h2{margin-bottom:.7rem}
        .garantia-text p{color:var(--muted);font-size:.92rem}

        /* ── CTA FINAL ── */
        .sec-cta{
            background:var(--bg3);
            border-top:1px solid var(--border);
            padding:5rem 0;text-align:center;
        }
        .summary{
            list-style:none;max-width:480px;
            margin:1.5rem auto 2.5rem;
            text-align:left;
        }
        .summary li{
            padding:.45rem 0;
            border-bottom:1px solid rgba(0,240,255,.08);
            font-size:.88rem;color:var(--muted);
            display:flex;gap:.55rem;
        }
        .summary li::before{content:"✓";color:var(--green);font-weight:700;flex-shrink:0}
        .final-price{
            font-family:"Orbitron",sans-serif;
            font-size:3.2rem;font-weight:900;
            color:var(--gold);
            text-shadow:0 0 24px rgba(245,197,58,.4);
            margin:.8rem 0 2rem;
        }
        .final-price sup{font-size:1.3rem;vertical-align:top;margin-top:.5rem}

        /* ── FOOTER ── */
        footer{
            background:var(--bg);
            border-top:1px solid var(--border);
            padding:1.4rem;text-align:center;
            font-size:.78rem;color:var(--muted);
            position:relative;z-index:2;
        }

        /* ── DIVIDER ── */
        .divider{
            height:1px;
            background:linear-gradient(90deg,transparent,var(--border),transparent);
            margin:0;
        }

        /* ── SCAN LINE ── */
        .scan-wrap{position:relative;overflow:hidden}
        .scan-wrap::after{
            content:"";position:absolute;
            top:0;left:0;right:0;height:2px;
            background:rgba(0,240,255,.3);
            animation:scan 4s linear infinite;
        }
        @keyframes scan{from{top:0}to{top:100%}}

        /* ── FADE IN ── */
        .fade-in{
            opacity:0;transform:translateY(24px);
            transition:opacity .6s ease,transform .6s ease;
        }
        .fade-in.visible{opacity:1;transform:translateY(0)}

        /* ── RESPONSIVE ── */
        @media(max-width:768px){
            .hero{padding:2rem 0 1.5rem;min-height:auto}
            .hero-grid{
                grid-template-columns:1fr;
                gap:1.5rem;
            }
            .hero-photo-wrap{
                order:-1;
                max-width:280px;
                margin:0 auto;
            }
            .hero h1{font-size:1.5rem}
            .hero-sub{font-size:.9rem}
            .price-strip{flex-direction:column;gap:.7rem;text-align:center}
            .price-val{font-size:1.8rem}
            .modulos-grid{grid-template-columns:1fr 1fr}
            .prof-inner{grid-template-columns:1fr}
            .prof-img{max-width:260px;margin:0 auto}
            .para-grid{grid-template-columns:1fr 1fr}
            .trans-grid{grid-template-columns:1fr}
            .bonus-card{flex-direction:column;gap:.8rem}
            .garantia-box{flex-direction:column;text-align:center;padding:2rem 1.2rem}
            section{padding:3rem 0}
        }
        @media(max-width:480px){
            .modulos-grid{grid-template-columns:1fr}
            .para-grid{grid-template-columns:1fr}
            .btn-green{font-size:.85rem;padding:.85rem 1.5rem}
        }
    </style>
</head>

<!-- HERO -->
<section class="hero">
<div class="wrap">
<div class="hero-grid">
    <div class="fade-in">
        <div class="hero-badge">Método Robotech</div>
        <h1>Aprende Robótica<br>desde Cero y<br><span>Enseña a Otros</span></h1>
        <p class="hero-sub">El método que le permite a CUALQUIER PERSONA dominar la robótica y compartirla con sus hijos y alumnos — sin experiencia previa.</p>
        <div class="price-strip">
            <div>
                <div class="price-label">Precio al contado</div>
                <div class="price-val"><sup>S/</sup> 120</div>
            </div>
            <div class="price-tag">100% Online · Acceso Inmediato</div>
        </div>
        <!-- ═══════════════════════════════════════
             BOTÓN DE COMPRA
             Actualiza el href con el link de Hotmart
             ═══════════════════════════════════════ -->
        <a href="#" class="btn btn-green" id="buy-btn">🚀 Quiero aprender robótica ahora</a>
        <p class="warning-txt">⚠️ Podemos cerrar esta oferta en cualquier momento</p>
    </div>

<section class="sec-modulos">

    <div class="tc fade-in">
        <p class="sec-eyebrow">Contenido del Curso</p>
        <h2 class="sec-title">¡Conoce lo que <span>aprenderás!</span></h2>
        <p class="sec-sub">Todo lo que necesitas para dominar la robótica de forma práctica</p>

    <div class="modulos-grid">
        <div class="mod-card fade-in"><div class="mod-icon">🔧</div><h3>Revisión, LEDs y Botones</h3><p>Aprenderás a configurar botones, LEDs y el funcionamiento completo del ESP32, el microcontrolador que usarás durante todo el curso.</p></div>
        <div class="mod-card fade-in" style="transition-delay:.1s"><div class="mod-icon">📡</div><h3>Entradas Analógicas</h3><p>Experimenta en la práctica con LEDs, displays, OLED con entradas analógicas. Aprende desde cero a experimentar con sensores.</p></div>
        <div class="mod-card fade-in" style="transition-delay:.2s"><div class="mod-icon">🔔</div><h3>Sensores</h3><p>Aprende a usar un sensor de luminosidad (LDR), a medir temperatura, sensor de humedad e integra todo en tus proyectos.</p></div>
        <div class="mod-card fade-in"><div class="mod-icon">⚡</div><h3>Teoría en la Práctica</h3><p>El curso tiene diversas prácticas para que puedas notar cómo la teoría del libro básico de robótica se aplica en la vida real.</p></div>
        <div class="mod-card fade-in" style="transition-delay:.1s"><div class="mod-icon">🤖</div><h3>Actuadores</h3><p>Nada regula la luminosidad o gira un motor sin modulación por largura de pulso. Aprende a controlar actuadores con código real.</p></div>
        <div class="mod-card fade-in" style="transition-delay:.2s"><div class="mod-icon">▶️</div><h3>Ve Todo en la Práctica</h3><p>Nuestro material tiene toda la teoría y más — mapeamos el código en pantalla para que puedas entender todo sin ser programador.</p></div>

<script>
/* ═══════════════════════════════════════════
   LINK DE COMPRA — ACTUALIZA AQUI
   Sustituye el "#" por el link de Hotmart
   ═══════════════════════════════════════════ */
var BUY_URL = "#";

document.querySelectorAll(".btn").forEach(function(el){
    if(el.getAttribute("href")==="#") el.href = BUY_URL;
});

/* ── CANVAS CIRCUITO ANIMADO ── */
(function(){
    var c=document.getElementById("circuit-bg");
    var ctx=c.getContext("2d");
    var W,H,nodes=[];

    function resize(){
        W=c.width=window.innerWidth;
        H=c.height=window.innerHeight;
    }
    resize();
    window.addEventListener("resize",resize);

    function Node(){
        this.x=Math.random()*W;
        this.y=Math.random()*H;
        this.vx=(Math.random()-.5)*.4;
        this.vy=(Math.random()-.5)*.4;
        this.r=Math.random()*2+1;
    }
    for(var i=0;i<60;i++) nodes.push(new Node());

    function draw(){
        ctx.clearRect(0,0,W,H);
        nodes.forEach(function(n){
            n.x+=n.vx; n.y+=n.vy;
            if(n.x<0||n.x>W) n.vx*=-1;
            if(n.y<0||n.y>H) n.vy*=-1;
            ctx.beginPath();
            ctx.arc(n.x,n.y,n.r,0,Math.PI*2);
            ctx.fillStyle="rgba(0,240,255,0.8)";
            ctx.fill();
        });
        for(var i=0;i<nodes.length;i++){
            for(var j=i+1;j<nodes.length;j++){
                var dx=nodes[i].x-nodes[j].x;
                var dy=nodes[i].y-nodes[j].y;
                var d=Math.sqrt(dx*dx+dy*dy);
                if(d<140){
                    ctx.beginPath();
                    ctx.moveTo(nodes[i].x,nodes[i].y);
                    ctx.lineTo(nodes[j].x,nodes[j].y);
                    ctx.strokeStyle="rgba(0,240,255,"+(1-d/140)*0.4+")";
                    ctx.lineWidth=.6;
                    ctx.stroke();
                }
            }
        }
        requestAnimationFrame(draw);
    }
    draw();
})();

/* ── FADE IN ON SCROLL ── */
(function(){
    var els=document.querySelectorAll(".fade-in");
    var io=new IntersectionObserver(function(entries){
        entries.forEach(function(e){
            if(e.isIntersecting) e.target.classList.add("visible");
        });
    },{threshold:.12});
    els.forEach(function(el){io.observe(el)});
    // hero items visible imediatamente
    document.querySelectorAll(".hero .fade-in").forEach(function(el){
        setTimeout(function(){el.classList.add("visible")},100);
    });
})();
</script>
